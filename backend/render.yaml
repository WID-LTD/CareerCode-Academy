services:
  - type: web
    name: careercode-academy-backend
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: FRONTEND_URL
        value: https://career-code-academy.vercel.app
      - key: BREVO_SENDER_EMAIL
        value: johndavidnzubechukwu008@gmail.com
      - key: BREVO_SENDER_NAME
        value: CareerCode Academy
