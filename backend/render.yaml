services:
  - type: web
    name: careercode-academy-backend
    env: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: FRONTEND_URL
        value: https://career-code-academy.vercel.app
      - key: CORS_ORIGINS
        value: https://career-code-academy.vercel.app,https://careercode-academy.onrender.com
      - key: BREVO_SENDER_EMAIL
        value: johndavidnzubechukwu008@gmail.com
      - key: BREVO_SENDER_NAME
        value: CareerCode Academy
      - key: BREVO_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: FLUTTERWAVE_SECRET_KEY
        sync: false
      - key: FLUTTERWAVE_PUBLIC_KEY
        sync: false
